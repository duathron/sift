name: CI
on:
  push:
  pull_request:

jobs:
  # Standard lint + format + test + build via the Shipwright reusable workflow,
  # matrixed across sift's supported Python versions.
  ci:
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    uses: duathron/shipwright/.github/workflows/python-ci.yml@v0.8.1
    with:
      python-version: ${{ matrix.python-version }}

  # Dogfood gate (offline) — enforce "no release without a dogfood pass" (G5),
  # mirrors barb. SHA pins match barb's eval/dogfood jobs (G7).
  dogfood:
    name: Dogfood gate (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: uv sync --dev
      - run: uv run bash dogfood.sh   # SIFT_DOGFOOD_LLM unset → live skipped, exit 0

  # Detection-quality gates — prompt-injection + IOC-classifier on labeled corpora:
  # injection precision/recall, IOC binary precision/recall, and IOC per-type
  # classification accuracy (exact type, not just != "unknown"). Floors live in the
  # harnesses (_DEFAULT_MIN_*) — single source of truth, no CLI flags. Any gate fails the job.
  eval:
    name: Detection-quality gates (injection + IOC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: uv sync --dev
      - run: uv run python -m eval.run_injection_eval
      - run: uv run python -m eval.run_ioc_eval
      - run: uv run python -m eval.run_ioc_type_eval
